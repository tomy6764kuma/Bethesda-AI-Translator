name: "publish"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm ci

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # tauri-action will replace __VERSION__ with the app version automatically
          releaseName: "Bethesda AI Translator v__VERSION__"
          releaseBody: "See the CHANGELOG.md for a list of changes."
          releaseDraft: true
          prerelease: false

      - name: Compress Portable Executable
        if: matrix.platform == 'windows-latest'
        run: |
          Compress-Archive -Path src-tauri/target/release/bethesda-ai-translator.exe -DestinationPath Bethesda-AI-Translator-Portable.zip
        shell: pwsh

      - name: Rearrange Release Assets (Upload Portable & Rename Installer)
        if: matrix.platform == 'windows-latest'
        run: |
          $tag = "${{ github.ref_name }}"
          
          # 1. Upload Portable Zip to the release draft
          gh release upload $tag Bethesda-AI-Translator-Portable.zip --clobber
          
          # 2. Find, rename and upload installer setup.exe, then delete original setup asset
          Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | ForEach-Object {
              $origPath = $_.FullName
              $origName = $_.Name
              $renamedName = "AutoUpdate-System-DO-NOT-DOWNLOAD-setup.exe"
              
              # Copy to renamed filename and upload
              Copy-Item $origPath -Destination $renamedName
              gh release upload $tag $renamedName --clobber
              
              # Delete the original installer from release draft (wrap in quotes to prevent spacing issues)
              Write-Host "Attempting to delete original asset: $origName"
              gh release delete-asset $tag "$origName" -y 2>$null
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "Notice: Original asset delete command returned non-zero code. Bypassing..."
              }
          }
          
          # 3. Find and delete the obsolete .msi installer from release draft to clean up list
          Get-ChildItem src-tauri/target/release/bundle/msi/*.msi | ForEach-Object {
              $origName = $_.Name
              Write-Host "Attempting to delete obsolete MSI: $origName"
              gh release delete-asset $tag "$origName" -y 2>$null
          }
          
          # Always force success exit code to ensure workflow finishes building successfully
          exit 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
