name: "publish"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install frontend dependencies
        run: npm ci

      - name: Build and Publish Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__ # tauri-action will replace __VERSION__ with the app version automatically
          releaseName: "Bethesda AI Translator v__VERSION__"
          releaseBody: "See the CHANGELOG.md for a list of changes."
          releaseDraft: true
          prerelease: false
          includeRelease: false

      - name: Prepare Release Assets
        if: matrix.platform == 'windows-latest'
        run: |
          # 1. Compress Portable Executable
          Compress-Archive -Path src-tauri/target/release/bethesda-ai-translator.exe -DestinationPath Bethesda-AI-Translator-Portable.zip
          
          # 2. Rename installer to prevent accidental download
          $setupExe = Get-ChildItem src-tauri/target/release/bundle/nsis/*-setup.exe | Select-Object -First 1
          if ($setupExe) {
              Copy-Item $setupExe.FullName -Destination "AutoUpdate-System-DO-NOT-DOWNLOAD-setup.exe"
          }
          
          # 3. Copy updater archive files
          $updaterZip = Get-ChildItem src-tauri/target/release/bundle/nsis/*.nsis.zip | Select-Object -First 1
          $updaterSig = Get-ChildItem src-tauri/target/release/bundle/nsis/*.nsis.zip.sig | Select-Object -First 1
          if ($updaterZip) {
              Copy-Item $updaterZip.FullName -Destination $updaterZip.Name
          }
          if ($updaterSig) {
              Copy-Item $updaterSig.FullName -Destination $updaterSig.Name
          }
        shell: pwsh

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        if: matrix.platform == 'windows-latest'
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            Bethesda-AI-Translator-Portable.zip
            AutoUpdate-System-DO-NOT-DOWNLOAD-setup.exe
            *.nsis.zip
            *.nsis.zip.sig
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
